name: Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'

jobs:
  backend:
    name: Express — Lint, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: apps/backend

      - name: Lint
        run: npm run lint
        working-directory: apps/backend

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/backend

      - name: Test
        run: npm test
        working-directory: apps/backend

      - name: Build
        run: npm run build
        working-directory: apps/backend
