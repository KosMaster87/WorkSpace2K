services:
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: ws2k-frontend
    restart: unless-stopped
    ports:
      # Port 4200 (Host) → 80 (Container-nginx)
      # Nicht 80:80 — Port 80 wird vom Reverse Proxy (nginx-proxy-manager) belegt.
      # NPM leitet workspace2k.dev2ksoftware.com → localhost:4200 weiter.
      # Lokale Entwicklung: ng serve (nicht diese Datei) → Port 4200 direkt.
      - '4200:80'
    networks:
      - ws2k
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: ws2k-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      # Seed-Variablen — nur für einmalige DB-Initialisierung benötigt
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
    volumes:
      # Docker Socket — für Container-Management (docker ps, logs, start/stop)
      - /var/run/docker.sock:/var/run/docker.sock
      # Stacks-Verzeichnis — für Compose-Editor (lesen + schreiben)
      - /opt/stacks:/opt/stacks
    networks:
      - ws2k
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: ws2k-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ws2k
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: workspace2k
    volumes:
      - ws2k_db:/var/lib/postgresql/data
    networks:
      - ws2k

networks:
  ws2k:
    driver: bridge

volumes:
  ws2k_db:
