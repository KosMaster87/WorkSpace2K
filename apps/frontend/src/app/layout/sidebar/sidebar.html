<aside class="sidebar" [class.sidebar--collapsed]="appStore.sidebarCollapsed()">
  <div class="sidebar__brand">
    <span class="sidebar__logo">W2K</span>
    @if (!appStore.sidebarCollapsed()) {
      <span class="sidebar__brand-name">WorkSpace2K</span>
    }
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a class="sidebar__link" [routerLink]="item.route" routerLinkActive="sidebar__link--active" [title]="item.label">
        <span class="sidebar__icon">{{ item.icon }}</span>
        @if (!appStore.sidebarCollapsed()) {
          <span class="sidebar__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    @if (user()) {
      <div class="sidebar__user">
        <span class="sidebar__user-avatar">{{ user()!.name[0] }}</span>
        @if (!appStore.sidebarCollapsed()) {
          <span class="sidebar__user-name">{{ user()!.name }}</span>
        }
      </div>
    }
    <button class="sidebar__logout" (click)="logout()" title="Logout">⏻</button>
  </div>
</aside>
