<header class="header">
  <button class="header__toggle" (click)="appStore.toggleSidebar()" title="Toggle Sidebar">☰</button>

  <h1 class="header__title">{{ appStore.pageTitle() }}</h1>

  <div class="header__actions">
    <button
      class="header__theme"
      (click)="appStore.toggleTheme()"
      [title]="appStore.theme() === 'dark' ? 'Light Mode' : 'Dark Mode'"
    >
      {{ appStore.theme() === 'dark' ? '☀' : '🌙' }}
    </button>
  </div>
</header>
