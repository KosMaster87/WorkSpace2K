services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: ws2k-frontend
    restart: unless-stopped
    ports:
      # Port 4200 (Host) → 80 (Container-nginx)
      # Nicht 80:80 — Port 80 wird vom Reverse Proxy (nginx-proxy-manager) belegt.
      # NPM leitet workspace2k.dev2ksoftware.com → localhost:4200 weiter.
      # Lokale Entwicklung: ng serve (nicht diese Datei) → Port 4200 direkt.
      - '4200:80'
    networks:
      - ws2k
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ws2k-backend
    restart: unless-stopped
    extra_hosts:
      # Linux: host.docker.internal auflösen → erreicht NPM auf Port 81 des Hosts
      - 'host.docker.internal:host-gateway'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      # Seed-Variablen — nur für einmalige DB-Initialisierung benötigt
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-}
      # Stacks-Scan-Pfade (kommagetrennt) — Standard + workspace2k/stacks im Repo
      - DOCKER_STACKS_PATH=/opt/stacks,/opt/stacks/workspace2k/stacks
      # NPM Auto-Provisioning (optional) — Proxy Hosts automatisch anlegen beim Stack-Start
      # Leer lassen = NPM-Integration deaktiviert (kein Fehler, kein Lärm)
      - NPM_URL=${NPM_URL:-http://host.docker.internal:81}
      - NPM_EMAIL=${NPM_EMAIL:-}
      - NPM_PASSWORD=${NPM_PASSWORD:-}
      - BASE_DOMAIN=${BASE_DOMAIN:-}
    volumes:
      # Docker Socket — für Container-Management (docker ps, logs, start/stop)
      # :z — SELinux-Label für Fedora/RHEL (relabelt den Mount als shared)
      - /var/run/docker.sock:/var/run/docker.sock:z
      # Stacks-Verzeichnis — für Compose-Editor (lesen + schreiben)
      # :z — SELinux-Label für Fedora/RHEL
      - /opt/stacks:/opt/stacks:z
    networks:
      - ws2k
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: ws2k-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ws2k
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: workspace2k
    volumes:
      - ws2k_db:/var/lib/postgresql/data
    networks:
      - ws2k

networks:
  ws2k:
    driver: bridge

volumes:
  ws2k_db:
