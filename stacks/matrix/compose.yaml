services:
  # ── Synapse — Matrix Homeserver ──────────────────────────────────
  #
  # Automatischer Erststart:
  # - homeserver.yaml wird auto-generiert wenn noch nicht vorhanden
  # - Registration ist aktiviert (enable_registration: true)
  # - Kein manuelles "docker compose run --rm synapse generate" nötig
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix
    restart: unless-stopped

    # Startup-Script: generiert Config beim ersten Start + patcht Registration
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /data/homeserver.yaml ]; then
          echo "Erster Start — generiere homeserver.yaml..."
          python -m synapse.app.homeserver \
            --config-path /data/homeserver.yaml \
            --generate-config \
            --server-name=matrix.dev2ksoftware.com \
            --report-stats=no
          echo "" >> /data/homeserver.yaml
          echo "enable_registration: true" >> /data/homeserver.yaml
          echo "enable_registration_without_verification: true" >> /data/homeserver.yaml
          echo "homeserver.yaml generiert mit Registration aktiviert."
        fi
        exec python -m synapse.app.homeserver --config-path /data/homeserver.yaml

    volumes:
      - synapse_data:/data

    networks:
      - npm_proxy

  # ── Element Web — Matrix Client ──────────────────────────────────
  element:
    image: vectorim/element-web:latest
    container_name: element
    restart: unless-stopped

    volumes:
      # :z = SELinux-Relabeling (Pflicht auf Fedora!)
      - ./element-config.json:/app/config.json:ro,z

    networks:
      - npm_proxy

    depends_on:
      - synapse

networks:
  npm_proxy:
    external: true

volumes:
  synapse_data:
